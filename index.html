<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>미니 타겟 게임</title>

  <style>
    body {
      background-color: #f8f4e3; /* 아이보리 */
      text-align: center;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-top: 20px;
    }

    #menu {
      margin: 15px;
    }

    #gameArea {
      width: 500px;
      height: 400px;
      margin: 20px auto;
      border: 2px solid #ccc;
      position: relative;
      background-color: #fffdf5;
    }

    /* 공 (무조건 보이게 기본 크기 포함) */
    #ball {
      position: absolute;
      width: 50px;
      height: 50px;
      background-color: green;
      border-radius: 50%;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>미니 타겟 게임</h1>

<div id="menu">
  <label>난이도 선택: </label>
  <select id="difficulty">
    <option value="easy">쉬움</option>
    <option value="normal">보통</option>
    <option value="hard">어려움</option>
  </select>
  <button onclick="startGame()">게임 시작</button>
</div>

<p>남은 시간: <span id="time">10</span>초</p>
<p>점수: <span id="score">0</span></p>
<p>최고 점수: <span id="highScore">0</span></p>

<div id="gameArea">
  <div id="ball"></div>
</div>

<!-- 효과음 -->
<audio id="clickSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b6b3d.mp3"></audio>

<script>
const ball = document.getElementById("ball");
const scoreText = document.getElementById("score");
const timeText = document.getElementById("time");
const highScoreText = document.getElementById("highScore");
const clickSound = document.getElementById("clickSound");

let score = 0;
let time = 10;
let size = 50;
let timer;

// 최고 점수 불러오기
let highScore = localStorage.getItem("highScore") || 0;
highScoreText.textContent = highScore;

// 중앙 배치
function centerBall() {
  const gameArea = document.getElementById("gameArea");
  const x = (gameArea.clientWidth - size) / 2;
  const y = (gameArea.clientHeight - size) / 2;

  ball.style.left = x + "px";
  ball.style.top = y + "px";
}

// 랜덤 이동
function moveBall() {
  const gameArea = document.getElementById("gameArea");
  const maxX = gameArea.clientWidth - size;
  const maxY = gameArea.clientHeight - size;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  ball.style.left = x + "px";
  ball.style.top = y + "px";
}

// 게임 시작
function startGame() {
  score = 0;
  time = 10;

  const diff = document.getElementById("difficulty").value;
  if (diff === "easy") size = 60;
  if (diff === "normal") size = 50;
  if (diff === "hard") size = 40;

  ball.style.width = size + "px";
  ball.style.height = size + "px";

  scoreText.textContent = score;
  timeText.textContent = time;

  centerBall();

  clearInterval(timer);
  timer = setInterval(() => {
    time--;
    timeText.textContent = time;

    if (time <= 0) {
      clearInterval(timer);

      if (score > highScore) {
        highScore = score;
        localStorage.setItem("highScore", highScore);
        highScoreText.textContent = highScore;
      }

      alert("게임 종료! 점수: " + score);
    }
  }, 1000);
}

// 클릭 이벤트
ball.addEventListener("click", () => {
  score++;
  scoreText.textContent = score;

  // 효과음
  clickSound.currentTime = 0;
  clickSound.play();

  // 점점 작아짐
  size *= 0.95;
  if (size < 15) size = 15;

  ball.style.width = size + "px";
  ball.style.height = size + "px";

  moveBall();
});

// 👉 페이지 열자마자 공 보이게
window.onload = () => {
  ball.style.width = size + "px";
  ball.style.height = size + "px";
  centerBall();
};
</script>

</body>
</html>
